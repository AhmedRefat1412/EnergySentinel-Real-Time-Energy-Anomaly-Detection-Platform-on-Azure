name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax (Notebooks)
        run: |
          python -m py_compile notebooks/*.py

      - name: Check Python syntax (Producer)
        run: |
          python -m py_compile producer/*.py

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 notebooks/ producer/ --max-line-length=120 --ignore=E501,W503
